# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# -----------------------------------------------------------------------------
# Core Behavior
# -----------------------------------------------------------------------------
# tmuxサーバープロセス側のロケールをUTF-8に固定
set-environment -g LANG "en_US.UTF-8"
set-environment -g LC_CTYPE "en_US.UTF-8"

# スクロールバック保持行数
set -g history-limit 50000
# メッセージ表示時間（ミリ秒）
set -g display-time 4000

# PrefixをC-aへ変更（既定C-bは無効化）
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# ウィンドウ/ペイン番号を1始まりにする
set -g base-index 1
setw -g pane-base-index 1

# マウス操作を有効化し、ホイールで必要時にcopy-modeへ入る
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# -----------------------------------------------------------------------------
# Activity Notification
# -----------------------------------------------------------------------------
# アクティビティ通知をステータスで視覚表示
setw -g monitor-activity on
set -g visual-activity on

# -----------------------------------------------------------------------------
# Copy Mode / Clipboard
# -----------------------------------------------------------------------------
# copy-modeのキーバインドをviスタイルにする
setw -g mode-keys vi

# Enterで選択範囲をmacOSクリップボードへコピーする
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Status Line Theme
# -----------------------------------------------------------------------------
# ステータス左右エリアの最大長
set-option -g status-left-length 90
set-option -g status-right-length 90
# ステータス更新間隔（秒）
set-option -g status-interval 5

# 互換性のため旧来スタイル指定も残す
set -g status-fg white
set -g status-bg black

# base style
set -g status-style "fg=colour252,bg=colour236"
set -g message-style "fg=colour230,bg=colour31"
set -g mode-style "fg=colour230,bg=colour166"

# left/right
set -g status-left '#{?client_prefix,#[fg=colour232,bg=colour203,bold] PREFIX #[default],} #[fg=colour250]#S '
set -g status-right '#[fg=colour236,bg=colour109]#[fg=colour232,bg=colour109] #(date "+%Y-%m-%d") #[fg=colour109,bg=colour180]#[fg=colour232,bg=colour180] %H:%M#[default]'

# window tabs
set -g window-status-format ' #[fg=colour245]#I:#W '
set -g window-status-current-format '#[fg=colour232,bg=colour110,bold] #I:#W #[default]'
set -g window-status-activity-style "fg=colour231,bg=colour130,bold"

# -----------------------------------------------------------------------------
# TPM Bootstrap (must stay at bottom)
# -----------------------------------------------------------------------------
run -b '~/.tmux/plugins/tpm/tpm'
